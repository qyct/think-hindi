<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>हिंदी शब्द संग्रह</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>हिंदी शब्द संग्रह</h1>
                <span class="subtitle">Word Collection</span>
            </div>
            <div class="word-count-badge" id="wordCountBadge"></div>
        </header>

        <div class="controls">
            <div class="input-group">
                <label for="wordCount">Words</label>
                <input type="number" id="wordCount" min="1" max="100" value="40">
            </div>

            <div class="input-group wide">
                <label>Levels</label>
                <div class="levels-grid">
                    <label class="level-checkbox"><input type="checkbox" value="01" checked> L1</label>
                    <label class="level-checkbox"><input type="checkbox" value="02"> L2</label>
                    <label class="level-checkbox"><input type="checkbox" value="03"> L3</label>
                    <label class="level-checkbox"><input type="checkbox" value="04"> L4</label>
                    <label class="level-checkbox"><input type="checkbox" value="05"> L5</label>
                    <label class="level-checkbox"><input type="checkbox" value="06"> L6</label>
                    <label class="level-checkbox"><input type="checkbox" value="07"> L7</label>
                    <label class="level-checkbox"><input type="checkbox" value="08"> L8</label>
                    <label class="level-checkbox"><input type="checkbox" value="09"> L9</label>
                    <label class="level-checkbox"><input type="checkbox" value="10"> L10</label>
                </div>
            </div>

            <div class="input-group">
                <label class="combine-checkbox">
                    <input type="checkbox" id="combineLevels">
                    Combine all levels
                </label>
            </div>

            <div class="btn-group">
                <button id="randomBtn" class="btn-primary">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"/><path d="m18 2 4 4-4 4"/><path d="M2 6h1.9c1.5 0 2.9.9 3.6 2.2"/><path d="m18 14 4 4-4 4"/><path d="M21.8 18H18c-1.3 0-2.5-.6-3.3-1.7l-.1-.1"/></svg>
                    Draw
                </button>

                <button id="copyBtn" class="btn-secondary">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                    Copy Words
                </button>

                <button id="copyPromptBtn" class="btn-secondary">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    Copy Prompt
                </button>
            </div>
        </div>

        <div id="wordsContainer" class="words-container">
            <div class="placeholder">Draw words to begin</div>
        </div>

        <div class="prompt-section">
            <div class="prompt-header">
                <label for="promptText">Learning Prompt</label>
                <span class="prompt-hint">Editable — paste directly into any AI chat</span>
            </div>
            <textarea id="promptText" placeholder="Draw words above to generate your learning prompt…"></textarea>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
